<rect width="1700" height="1100" fill="#0d0d0d"/>

<!-- Title -->
<text x="850" y="30" text-anchor="middle" font-size="20" font-weight="800" fill="#fff" letter-spacing="1">SKY130 Two-Stage Pelliconi Charge Pump</text>
<text x="850" y="48" text-anchor="middle" font-size="11" fill="#555" letter-spacing="0.3">Exact topology from design.cir | 1.8V supply | 60MHz complementary clocks</text>

